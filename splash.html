<html lang="en">

<head>
    <meta name="referrer" content="no-referrer-when-downgrade">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventNest — Book Your Next Experience</title>
    <meta name="description" content="EventNest — Book tickets for movies, concerts and live events.">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --red: #E50914;
            --red-h: #f40612;
            --bg: #050505;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: 'Roboto', 'Helvetica Neue', Arial, sans-serif;
        }

        /* â”€â”€ POSTER WALL â”€â”€ */
        .poster-wall {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 14px;
            transform: rotate(-18deg) scale(1.45);
            transform-origin: center center;
            z-index: 0;
            pointer-events: none;
        }

        .poster-track {
            display: flex;
            gap: 12px;
            width: max-content;
        }

        @keyframes goLeft {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(-50%);
            }
        }

        @keyframes goRight {
            from {
                transform: translateX(-50%);
            }

            to {
                transform: translateX(0);
            }
        }

        .row-1 .poster-track {
            animation: goLeft 32s linear infinite;
        }

        .row-2 .poster-track {
            animation: goRight 40s linear infinite;
        }

        .row-3 .poster-track {
            animation: goLeft 25s linear infinite;
        }

        .poster {
            width: 108px;
            height: 160px;
            border-radius: 4px;
            flex-shrink: 0;
            opacity: 0.88;
            border: 1px solid rgba(255, 255, 255, 0.12);
            overflow: hidden;
            position: relative;
        }

        .poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: brightness(1.1) saturate(1.15);
            position: absolute;
            inset: 0;
            z-index: 3;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .poster img.loaded {
            opacity: 1;
        }

        .fallback-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        .fallback-content {
            position: absolute;
            inset: 0;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 10px 8px;
        }

        .fallback-content::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0) 30%, rgba(0, 0, 0, 0.85) 100%);
            z-index: -1;
        }

        .fallback-genre {
            font-family: 'Roboto', sans-serif;
            font-size: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            color: #fff;
            padding: 3px 6px;
            border-radius: 12px;
            align-self: flex-start;
        }

        .fallback-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 16px;
            letter-spacing: 1px;
            color: #fff;
            line-height: 1.1;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        }

        /* â”€â”€ OVERLAYS â”€â”€ */
        .vignette {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: radial-gradient(ellipse at center,
                    transparent 0%, transparent 18%,
                    rgba(20, 20, 20, 0.5) 42%,
                    rgba(20, 20, 20, 0.88) 64%,
                    rgba(20, 20, 20, 0.97) 83%,
                    #141414 100%);
        }

        .fade-top {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 260px;
            z-index: 2;
            pointer-events: none;
            background: linear-gradient(to bottom, #141414 0%, transparent 100%);
        }

        .fade-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 260px;
            z-index: 2;
            pointer-events: none;
            background: linear-gradient(to top, #141414 0%, transparent 100%);
        }

        /* â”€â”€ PAGE LOADER â”€â”€ */
        .loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), visibility 1s;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.05);
            border-top-color: var(--red);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* â”€â”€ HERO UI (Glassmorphism) â”€â”€ */
        .hero-ui {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            padding: 20px;
        }
        
        .hero-content-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            pointer-events: auto;
            transform: translateY(20px);
            opacity: 0;
            animation: popIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
        }

        @keyframes popIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .pre-tag {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--red);
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(229, 9, 20, 0.3);
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(80px, 12vw, 140px);
            letter-spacing: 8px;
            line-height: 0.9;
            margin-bottom: 15px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
        }

        .logo .r {
            color: var(--red);
            text-shadow: 0 0 30px rgba(229, 9, 20, 0.4);
        }

        .logo .w {
            background: linear-gradient(180deg, #ffffff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
        }

        .enter-btn {
            font-family: 'Roboto', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #fff;
            background: linear-gradient(135deg, var(--red) 0%, #900000 100%);
            border: none;
            border-radius: 50px;
            padding: 18px 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 30px rgba(229, 9, 20, 0.4), inset 0 2px 0 rgba(255,255,255,0.2);
            position: relative;
            overflow: hidden;
        }
        
        .enter-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: all 0.5s ease;
        }

        .enter-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 40px rgba(229, 9, 20, 0.6), inset 0 2px 0 rgba(255,255,255,0.2);
        }
        
        .enter-btn:hover::before {
            left: 100%;
        }

        .enter-btn:active {
            transform: scale(0.98);
        }

        /* â”€â”€ SCROLL HINT â”€â”€ */
        .scroll-hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            opacity: 0;
            animation: popIn 1s ease 1.5s forwards;
            pointer-events: none;
        }

        .scroll-hint span {
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
        }

        .scroll-line {
            width: 2px;
            height: 40px;
            background: linear-gradient(to bottom, var(--red), transparent);
            border-radius: 2px;
            animation: slideDown 2s cubic-bezier(0.6, 0.05, 0.15, 0.95) infinite;
            transform-origin: top;
        }

        @keyframes slideDown {
            0% { transform: scaleY(0); opacity: 0; }
            50% { transform: scaleY(1); opacity: 1; }
            100% { transform: scaleY(0); opacity: 0; transform-origin: bottom; }
        }
    </style>
</head>

        // Fallback gradient classes when images fail
        const FALLBACKS = [
            'linear-gradient(145deg,#1a0533,#2d1460)',
            'linear-gradient(145deg,#031a1a,#0a4a4a)',
            'linear-gradient(145deg,#1a0505,#4a0e0e)',
            'linear-gradient(145deg,#050520,#1a1a6a)',
            'linear-gradient(145deg,#031208,#0a3a18)',
            'linear-gradient(145deg,#1a0515,#4a0a30)',
            'linear-gradient(145deg,#1a1005,#4a2c00)',
            'linear-gradient(145deg,#020820,#0a1a50)',
        ];

        function buildRow(movies, rowClass) {
            const rowEl = document.createElement('div');
            rowEl.className = `poster-row ${rowClass}`;

            const track = document.createElement('div');
            track.className = 'poster-track';

            // Duplicate for seamless infinite loop
            [...movies, ...movies].forEach((m, i) => {
                const card = document.createElement('div');
                card.className = 'poster';

                // Set rich fallback immediately
                const fallbackBg = document.createElement('div');
                fallbackBg.className = 'fallback-bg';
                fallbackBg.style.background = FALLBACKS[i % FALLBACKS.length];

                const fallbackContent = document.createElement('div');
                fallbackContent.className = 'fallback-content';
                fallbackContent.innerHTML = `
            <span class="fallback-genre">${m.genre}</span>
            <span class="fallback-title">${m.title}</span>
        `;

                card.appendChild(fallbackBg);
                card.appendChild(fallbackContent);

                // Preload image in background
                const img = new Image();
                let proxyAttempts = [];
                if (m.img && m.img.startsWith('http')) {
                    const cleanUrl = m.img.replace(/^https?:\/\//, '');
                    proxyAttempts = [
                        m.img,
                        `https://i0.wp.com/${cleanUrl}`,
                        `https://i1.wp.com/${cleanUrl}`,
                        `https://images.weserv.nl/?url=${encodeURIComponent(cleanUrl)}`,
                        `https://wsrv.nl/?url=${encodeURIComponent(cleanUrl)}`
                    ];
                } else {
                    proxyAttempts = [m.img || ''];
                }

                let attemptIndex = 0;

                img.onload = () => {
                    img.alt = m.title;
                    card.appendChild(img);
                    // Slight delay to ensure DOM paint before opacity transition
                    requestAnimationFrame(() => {
                        img.classList.add('loaded');
                    });
                };
                img.onerror = () => {
                    attemptIndex++;
                    if (attemptIndex < proxyAttempts.length) {
                        img.src = proxyAttempts[attemptIndex];
                    } else {
                        img.onerror = null;
                        img.remove();
                    }
                };
                img.src = proxyAttempts[0];

                track.appendChild(card);
            });

            rowEl.appendChild(track);
            return rowEl;
        }

        const wall = document.getElementById('posterWall');
        wall.appendChild(buildRow(row1, 'row-1'));
        wall.appendChild(buildRow(row2, 'row-2'));
        wall.appendChild(buildRow(row3, 'row-3'));

        window.addEventListener('load', () => {

                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.visibility = 'hidden', 1000);
                }
            }, 600); // Allow some posters to load before hiding spinner
        });



        // â”€â”€ ENTER SITE TRANSITION â”€â”€
        function enterSite() {
            document.body.style.transition = 'opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
            document.body.style.opacity = '0';
            setTimeout(() => { window.location.href = "index.html"; }, 620);
        }
