<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="referrer" content="no-referrer-when-downgrade">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Seminars | EventNest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #0d0d14;
            color: #fff;
            font-family: 'Inter', sans-serif;
            padding-top: 80px;
        }

        /* Hero Section */
        .seminar-hero {
            position: relative;
            height: 40vh;
            background: url('images/s_hero.jpg') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-bottom: 50px;
        }

        .seminar-hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(13, 13, 20, 0.3), rgba(13, 13, 20, 1));
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Seminar Cards */
        .seminar-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .seminar-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 242, 254, 0.15);
            border-color: rgba(0, 242, 254, 0.3);
        }

        .card-img-wrapper {
            position: relative;
            height: 220px;
            overflow: hidden;
        }

        .card-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .seminar-card:hover .card-img-wrapper img {
            transform: scale(1.1);
        }

        .category-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            color: #00f2fe;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 1px solid rgba(0, 242, 254, 0.3);
        }

        .card-body {
            padding: 25px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .seminar-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #fff;
        }

        .seminar-detail {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            color: #aaa;
            font-size: 0.9rem;
        }

        .seminar-detail i {
            width: 24px;
            color: #4facfe;
            font-size: 1.1rem;
        }

        .speaker-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 15px;
            border-radius: 8px;
            margin-top: 15px;
            margin-bottom: 20px;
        }

        .speaker-box img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 12px;
            object-fit: cover;
            border: 2px solid #4facfe;
        }

        .speaker-info h6 {
            margin: 0;
            font-size: 0.9rem;
            color: #ddd;
        }

        .speaker-info small {
            color: #888;
            font-size: 0.75rem;
        }

        .card-footer-custom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .price {
            font-size: 1.2rem;
            font-weight: 800;
            color: #fff;
        }

        .book-btn {
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            color: #000;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 700;
            transition: all 0.3s;
        }

        .book-btn:hover {
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
            transform: translateY(-2px);
            color: #000;
        }
    </style>
</head>
<body>

    <!-- Simple Navbar -->
    <nav class="navbar navbar-dark fixed-top" style="background: rgba(13, 13, 20, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05);">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-arrow-left me-2"></i> Event<span style="color: #4facfe;">Nest</span>
            </a>
        </div>
    </nav>

    <!-- Hero -->
    <header class="seminar-hero">
        <div class="hero-content">
            <h1 class="hero-title">Tech Seminars</h1>
            <p class="lead text-light">Learn from industry pioneers. Shape the future.</p>
        </div>
    </header>

    <div class="container mb-5">
        <div class="row g-4" id="seminarsList">
            <!-- Populated by JS -->
        </div>
    </div>

    <script>
        const seminars = [
            {
                title: "AI & The Future of Tech",
                category: "Artificial Intelligence",
                date: "12 Oct 2026",
                time: "10:00 AM",
                venue: "Bombay Convention Center, Mumbai",
                price: 1500,
                image: "images/s_ai.jpg",
                speaker: "Dr. Alan Turing",
                speakerRole: "Chief AI Scientist",
                speakerImg: "images/av_turing.jpg"
            },
            {
                title: "Web3 & Blockchain Summit",
                category: "Web3",
                date: "18 Oct 2026",
                time: "11:30 AM",
                venue: "DLF Cyber City, Delhi",
                price: 2000,
                image: "images/s_web3.jpg",
                speaker: "Satoshi N.",
                speakerRole: "Blockchain Architect",
                speakerImg: "images/av_satoshi.jpg"
            },
            {
                title: "Cloud Architecture Masterclass",
                category: "Cloud Computing",
                date: "22 Oct 2026",
                time: "09:00 AM",
                venue: "Whitefield Tech Park, Bangalore",
                price: 1200,
                image: "images/s_cloud.jpg",
                speaker: "Sarah Jenkins",
                speakerRole: "VP Cloud Solutions",
                speakerImg: "images/av_sarah.jpg"
            },
            {
                title: "Cybersecurity Defense Strategies",
                category: "Cybersecurity",
                date: "05 Nov 2026",
                time: "02:00 PM",
                venue: "HICC, Hyderabad",
                price: 2500,
                image: "images/s_cyber.jpg",
                speaker: "Kevin Mitnick",
                speakerRole: "Security Consultant",
                speakerImg: "images/av_kevin.jpg"
            }
        ];

        function renderSeminars() {
            const container = document.getElementById('seminarsList');
            container.innerHTML = seminars.map((s, index) => {
                const safeData = encodeURIComponent(JSON.stringify(s));
                return `
                <div class="col-lg-4 col-md-6">
                    <div class="seminar-card">
                        <div class="card-img-wrapper">
                            <span class="category-badge">${s.category}</span>
                            <img src="${s.image}" alt="${s.title}" onerror="this.onerror=null; this.src='images/s_hero.jpg';">
                        </div>
                        <div class="card-body">
                            <h3 class="seminar-title">${s.title}</h3>
                            
                            <div class="seminar-detail">
                                <i class="bi bi-calendar-event"></i>
                                <span>${s.date} • ${s.time}</span>
                            </div>
                            <div class="seminar-detail">
                                <i class="bi bi-geo-alt"></i>
                                <span>${s.venue}</span>
                            </div>

                            <div class="speaker-box">
                                <img src="${s.speakerImg}" alt="${s.speaker}" onerror="this.onerror=null; this.src='images/av_sarah.jpg';">
                                <div class="speaker-info">
                                    <h6>${s.speaker}</h6>
                                    <small>${s.speakerRole}</small>
                                </div>
                            </div>

                            <div class="card-footer-custom">
                                <div class="price">₹${s.price.toLocaleString()}</div>
                                <button class="btn book-btn" onclick="viewDetails('${safeData}')">View Details</button>
                            </div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function viewDetails(dataString) {
            const data = JSON.parse(decodeURIComponent(dataString));
            localStorage.setItem("currentSeminar", JSON.stringify(data));
            window.location.href = "seminar_details.html";
        }

        document.addEventListener('DOMContentLoaded', renderSeminars);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
