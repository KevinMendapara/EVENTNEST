<!DOCTYPE html>
<html>
<head>
    <meta name="referrer" content="no-referrer-when-downgrade">
  <title>Movies</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="movies.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top" style="background: rgba(0,0,0,0.8) !important; backdrop-filter: blur(10px);">
      <div class="container-fluid px-4">
          <a class="navbar-brand fw-bold" href="index.html">Event<span style="color:#fff">Nest</span></a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
              <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="menu">
              <div class="d-flex align-items-center ms-auto gap-3 flex-wrap">
                  <!-- SEARCH BAR -->
                  <div class="d-flex">
                      <input class="form-control" type="search" placeholder="Search Movie..." id="search">
                  </div>
                  <!-- GENRE SELECT -->
                  <select class="form-select" style="width:150px;" id="genreFilter">
                      <option value="">All Genres</option>
                      <option value="Action">Action</option>
                      <option value="Comedy">Comedy</option>
                      <option value="Drama">Drama</option>
                      <option value="Sci-Fi">Sci-Fi</option>
                      <option value="Animation">Animation</option>
                  </select>
                  <!-- CITY SELECT -->
                  <select class="form-select" style="width:150px;" id="citySelect">
                      <option value="">📍 Select City</option>
                      <option value="Mumbai">Mumbai</option>
                      <option value="Delhi">Delhi</option>
                      <option value="Bangalore">Bangalore</option>
                      <option value="Hyderabad">Hyderabad</option>
                      <option value="Chennai">Chennai</option>
                      <option value="Kolkata">Kolkata</option>
                      <option value="Pune">Pune</option>
                      <option value="Ahmedabad">Ahmedabad</option>
                  </select>
                  <ul class="navbar-nav ms-auto">
                      <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                      <li class="nav-item"><a href="movies.html" class="nav-link active">Movies</a></li>
                      <li class="nav-item"><a href="concerts.html" class="nav-link">Concerts</a></li>
                  </ul>
              </div>
          </div>
      </div>
  </nav>

  <!-- Hero Section -->
  <div class="hero movie-hero" style="background-image: url('main_hero.png') !important; background-size: cover !important; background-position: center center !important;">
    <div class="container text-center text-md-start">
        <h1>Blockbuster Movies</h1>
        <p>Book tickets for the biggest movies of the year. Experience cinema like never before.</p>
    </div>
  </div>

  <!-- Movies List -->
  <div class="container shared-section">
    <h2 class="section-title mb-4"><span>Now</span> Showing</h2>
    <div id="movieList" class="grid mb-5"></div>
    
    <h2 class="section-title mb-4 mt-5"><span>Upcoming</span> Movies</h2>
    <div id="upcomingMovieList" class="grid"></div>
  </div>

  <footer class="text-center mt-5">
      <div class="container">
          <p class="mb-0">© 2026 Event Booking. All rights reserved.</p>
      </div>
  </footer>

  <script src="movies.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
