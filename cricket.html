  <link rel="stylesheet" href="style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
        background-color: #0a0a0f;
        color: #e0e0e0;
        font-family: 'Inter', 'Segoe UI', sans-serif;
        margin: 0;
    }

    /* ====== HERO SECTION ====== */
    .hero.cricket-hero {
        background-image: url('images/cricket_banner.png');
        background-size: cover;
        background-position: center;
        padding: 140px 0 100px;
        position: relative;
        text-align: center;
        perspective: 1200px;
    }
    .hero.cricket-hero::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(10,10,15,0.85) 0%, rgba(10,10,15,0.4) 50%, rgba(10,10,15,1) 100%);
        z-index: 1;
    }
    .hero.cricket-hero .container {
        position: relative;
        z-index: 2;
        transform-style: preserve-3d;
        animation: float3D 8s ease-in-out infinite;
    }
    
    @keyframes float3D {
        0%, 100% { transform: translateY(0) rotateX(2deg) rotateY(-2deg); }
        50% { transform: translateY(-10px) rotateX(-2deg) rotateY(2deg); }
    }

    .hero-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(229, 9, 20, 0.2);
        border: 1px solid rgba(229, 9, 20, 0.4);
        color: #ff6b6b;
        padding: 6px 18px;
        border-radius: 50px;
        font-size: 0.85rem;
        font-weight: 600;
        margin-bottom: 20px;
        letter-spacing: 0.5px;
        backdrop-filter: blur(10px);
        transform: translateZ(20px);
    }
    .hero-badge .pulse-dot {
        width: 8px;
        height: 8px;
        background: #e50914;
        border-radius: 50%;
        animation: pulse 2s infinite;
    }
    @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(1.3); }
    }
    .hero h1 {
        font-size: 4.5rem;
        font-weight: 900;
        letter-spacing: -2px;
        margin-bottom: 15px;
        background: linear-gradient(180deg, #ffffff 0%, #b3b3b3 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.8)) drop-shadow(0 0 30px rgba(229, 9, 20, 0.5));
        transform: translateZ(50px);
    }
    .hero .lead {
        font-size: 1.15rem;
        color: rgba(255,255,255,0.85);
        max-width: 550px;
        margin: 0 auto;
        line-height: 1.6;
        transform: translateZ(30px);
        text-shadow: 0 4px 10px rgba(0,0,0,0.8);
    }

    /* ====== SECTION TITLES ====== */
    .section-title {
        font-size: 1.6rem;
        font-weight: 800;
        padding-bottom: 14px;
        margin-bottom: 28px;
        position: relative;
        letter-spacing: -0.3px;
    }
    .section-title::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 60px;
        height: 3px;
        background: linear-gradient(90deg, #e50914, transparent);
        border-radius: 2px;
    }
    .section-title span {
        color: #e50914;
    }

    /* ====== MATCH CARDS ====== */
    .cricket-card {
        background: #15151f;
        border-radius: 14px;
        overflow: hidden;
        transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        height: 100%;
        display: flex;
        flex-direction: column;
        border: 1px solid rgba(255,255,255,0.05);
        transform-style: preserve-3d;
        perspective: 1000px;
    }
    .cricket-card:hover {
        box-shadow: 0 30px 60px rgba(0,0,0,0.6),
                    0 0 0 1px rgba(229, 9, 20, 0.2);
        border-color: rgba(229, 9, 20, 0.4);
    }

    /* ====== SVG BANNER ====== */
    .match-banner-wrapper {
        width: 100%;
        position: relative;
        overflow: hidden;
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .match-banner-svg {
        width: 100%;
        height: auto;
        display: block;
    }

    /* ====== CARD CONTENT ====== */
    .cricket-content {
        padding: 20px 22px 22px;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
    }
    .cricket-title {
        font-weight: 700;
        font-size: 1.05rem;
        margin-bottom: 12px;
        color: #fff;
        line-height: 1.35;
    }
    .cricket-content .text-muted {
        color: rgba(255,255,255,0.45) !important;
        font-size: 0.85rem;
    }
    .cricket-content .text-muted i {
        margin-right: 4px;
        color: rgba(229, 9, 20, 0.6);
    }

    /* ====== BOOK BUTTON ====== */
    .book-btn {
        background: linear-gradient(135deg, #e50914 0%, #b20710 100%);
        color: white;
        border: none;
        padding: 12px 16px;
        width: 100%;
        border-radius: 8px;
        font-weight: 700;
        font-size: 0.9rem;
        margin-top: auto;
        cursor: pointer;
        transition: all 0.25s ease;
        letter-spacing: 0.3px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }
    .book-btn:hover {
        background: linear-gradient(135deg, #ff1a25 0%, #c70812 100%);
        box-shadow: 0 6px 20px rgba(229, 9, 20, 0.4);
        transform: translateY(-1px);
    }
    .book-btn:active {
        transform: translateY(0);
    }

    /* ====== FOOTER ====== */
    .cricket-footer {
        background: #0d0d14;
        border-top: 1px solid rgba(255,255,255,0.06);
        padding: 30px 0;
        text-align: center;
        color: rgba(255,255,255,0.35);
        font-size: 0.85rem;
        margin-top: 60px;
    }

    /* ====== RESPONSIVE ====== */
    @media (max-width: 768px) {
        .hero h1 { font-size: 2.2rem; }
        .hero.cricket-hero { padding: 120px 0 70px; }
        .section-title { font-size: 1.3rem; }
    }

    /* ====== ANIMATIONS ====== */
    .cricket-card {
        opacity: 0;
        transform: translateY(30px);
        animation: fadeInUp 0.6s forwards;
    }
    .col-md-4:nth-child(1) .cricket-card { animation-delay: 0.1s; }
    .col-md-4:nth-child(2) .cricket-card { animation-delay: 0.2s; }
    .col-md-4:nth-child(3) .cricket-card { animation-delay: 0.3s; }
    .col-md-4:nth-child(4) .cricket-card { animation-delay: 0.4s; }
    .col-md-4:nth-child(5) .cricket-card { animation-delay: 0.5s; }
    .col-md-4:nth-child(6) .cricket-card { animation-delay: 0.6s; }

    @keyframes fadeInUp {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
  </style>
</head>
