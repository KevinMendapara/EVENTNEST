<!DOCTYPE html>
<html>
<head>
    <meta name="referrer" content="no-referrer-when-downgrade">
  <title>Concert Details</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="concert.css">
  <link rel="stylesheet" href="concert.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top" style="background: rgba(0,0,0,0.8) !important; backdrop-filter: blur(10px);">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Event Booking</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <div class="d-flex align-items-center ms-auto">
                    <!-- SEARCH BAR -->
                    <form class="d-flex me-3">
                        <input class="form-control me-2" type="search" placeholder="Search events or movies" id="searchInput">
                        <button class="btn btn-warning" type="button" onclick="searchEvent()">
                            <i class="bi bi-search"></i>
                        </button>
                    </form>
                    <!-- CITY SELECT -->
                    <select class="form-select me-3" style="width:180px;" id="citySelect">
                        <option selected>📍 Select City</option>
                        <option>Mumbai</option>
                        <option>Delhi</option>
                        <option>Bangalore</option>
                    </select>
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                        <li class="nav-item"><a href="concerts.html" class="nav-link">Events</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

  <div class="container" style="margin-top: 100px;">
    <!-- Normal Sized Hero -->
    <div id="heroBanner" class="hero-banner-normal mb-5 shadow-lg">
      <div class="hero-overlay-normal">
        <div class="hero-content p-4 ms-md-4">
          <h1 id="title" class="display-4 fw-bold text-white mb-3"></h1>
          <p class="lead text-white mb-2"><i class="bi bi-geo-alt-fill text-danger me-2"></i><span id="location"></span></p>
          <p class="text-light mb-2"><i class="bi bi-calendar-event text-danger me-2"></i><span id="eventDate"></span></p>
          <p class="text-light"><i class="bi bi-clock-fill text-danger me-2"></i><span id="eventTime"></span></p>
        </div>
      </div>
    </div>

    <!-- Seat Selection -->
    <div class="seat-selection-panel p-5 mb-5 rounded-4" style="background: #141414; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        
        <div class="stage-container mb-5">
            <div class="stage-curve"></div>
            <div class="stage-text text-secondary text-center mt-3 text-uppercase fw-bold" style="letter-spacing: 4px; font-size: 0.85rem;">Stage</div>
        </div>

        <div id="timer" class="text-warning text-center fw-bold fs-5 mb-2">⏳ Time Left: 5:00</div>
        <h3 class="text-white text-center fw-bold mb-4">Select Your Seats</h3>

        <!-- LEGEND -->
        <div class="legend d-flex justify-content-center gap-4 mb-5 flex-wrap">
          <div class="d-flex align-items-center gap-2"><span class="box available" style="background:#555;"></span> <span class="text-light">Available</span></div>
          <div class="d-flex align-items-center gap-2"><span class="box selected" style="background:#fff;"></span> <span class="text-light">Selected</span></div>
          <div class="d-flex align-items-center gap-2"><span class="box booked" style="background:#2b2b2b;"></span> <span class="text-light">Booked</span></div>
          <div class="d-flex align-items-center gap-2"><span class="box vip" style="background:#E50914;"></span> <span class="text-light">VIP</span></div>
          <div class="d-flex align-items-center gap-2"><span class="box gold" style="background:#f5b52a;"></span> <span class="text-light">Gold</span></div>
          <div class="d-flex align-items-center gap-2"><span class="box silver" style="background:#555;"></span> <span class="text-light">Silver</span></div>
        </div>

        <div class="ground-wrapper text-center w-100 overflow-auto mb-5">
            <div id="groundLayout" class="ground-layout d-flex flex-column align-items-center mx-auto" style="min-width: 700px;"></div>
        </div>
        
        <div class="booking-summary p-4 rounded-3 mb-4 d-flex flex-column flex-md-row justify-content-between align-items-center" style="background: rgba(255,255,255,0.05); border: 1px solid #333;">
          <div class="text-center text-md-start mb-3 mb-md-0">
            <h5 class="text-secondary mb-1">Selected Seats (<span id="seatCount">0</span>)</h5>
            <h4 class="text-white mb-0" id="selectedSeats">None</h4>
          </div>
          <div class="text-center text-md-end">
            <h5 class="text-secondary mb-1">Total Amount</h5>
            <h3 class="text-white fw-bold mb-0">Rs. <span id="total">0</span></h3>
          </div>
        </div>

        <div class="d-flex flex-column flex-md-row gap-3">
          <button onclick="selectBestSeats()" class="btn btn-outline-light btn-lg flex-grow-1 py-3 border-secondary">
            Auto Select Best Seats <i class="bi bi-magic ms-2"></i>
          </button>
          <button onclick="goToPayment()" id="proceedBtn" class="btn btn-danger btn-lg flex-grow-1 fw-bold py-3" style="background-color: #E50914;">
            Proceed to Payment <i class="bi bi-arrow-right ms-2"></i>
          </button>
        </div>

      </div>
    </div>
    
    <!-- More Singers Section -->
    <div class="more-singers-section mt-5 p-5 rounded-4" style="background: #141414; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        <h3 class="text-white fw-bold mb-4"><i class="bi bi-music-note-beamed text-danger me-2"></i>You Might Also Like</h3>
        <div id="moreSingersList" class="row g-4"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="bg-dark text-white text-center py-4 mt-5 border-top border-secondary">
    <p class="mb-0">© 2026 EventBook | Online Ticket Booking System</p>
  </footer>

  <script src="concerts.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // ================= LOAD DATA =================
    let data = JSON.parse(localStorage.getItem("concertData"));
    if (data) {
      document.getElementById("title").innerText = data.name + " Live";
      document.getElementById("location").innerText = (data.venue ? data.venue + ", " : "") + data.city;
      document.getElementById("eventDate").innerText = data.date || "TBD";
      document.getElementById("eventTime").innerText = data.time || "TBD";
      let heroBanner = document.getElementById("heroBanner");
      
      // Programmatic Image Preloader for resilient background assignment
      const mainImg = new Image();
      mainImg.onload = function() {
        heroBanner.style.backgroundImage = `url('${data.img}')`;
      };
      mainImg.onerror = function() {
        console.warn("Failed to load concert details banner image, falling back to images/c_hero.jpg");
        heroBanner.style.backgroundImage = "url('images/c_hero.jpg')";
      };
      mainImg.src = data.img;
    } else {
      window.location.href = "index.html";
    }

    let basePrice = data ? Number(data.price) : 500;

    // ================= SEAT SYSTEM =================
    let selected = [];
    let groundLayout = document.getElementById("groundLayout");
    let bookedSeats = JSON.parse(localStorage.getItem("bookedSeats")) || [];

    let arena = [
      { id: "vip-pit", name: "VIP Pit", type: "vip", price: basePrice + 500, seatsPerRow: [10, 12, 14], colorClass: "text-danger" },
      { type: "split", items: [
          { id: "gold-left", name: "Gold Stand (L)", type: "gold", price: basePrice + 200, seatsPerRow: [6, 7, 8, 9], colorClass: "text-warning" },
          { id: "gold-right", name: "Gold Stand (R)", type: "gold", price: basePrice + 200, seatsPerRow: [6, 7, 8, 9], colorClass: "text-warning" }
      ]},
      { id: "silver-rear", name: "Silver Balcony", type: "silver", price: basePrice, seatsPerRow: [18, 20, 22, 24], colorClass: "text-secondary" }
    ];

    function createSeat(info, seatNumber) {
        let seat = document.createElement("div");
        seat.classList.add("seat", info.type);
        seat.innerText = seatNumber.replace(/[^0-9]/g, ''); // Number only
        seat.title = `${info.name} - Seat ${seatNumber} - Rs. ${info.price}`;

        if (bookedSeats.includes(seatNumber)) {
          seat.classList.add("booked");
        }

        seat.onclick = function () {
            if (seat.classList.contains("booked")) return;
            seat.classList.add("locking");

            setTimeout(() => {
                seat.classList.remove("locking");

                if (!seat.classList.contains("selected") && selected.length >= 6) {
                    alert("Max 6 seats allowed");
                    return;
                }

                seat.classList.toggle("selected");

                if (selected.find(s => s.num === seatNumber)) {
                    selected = selected.filter(s => s.num !== seatNumber);
                } else {
                    selected.push({ num: seatNumber, price: info.price });
                }
                updateTotal();
            }, 150);
        };
        return seat;
    }

    function createBlock(blockData, prefix) {
        let blockDiv = document.createElement("div");
        blockDiv.classList.add("seat-block");
        blockDiv.id = blockData.id;

        let title = document.createElement("h6");
        title.className = `text-center mb-3 fw-bold text-uppercase ${blockData.colorClass}`;
        title.style.letterSpacing = "2px";
        title.innerText = blockData.name;
        blockDiv.appendChild(title);

        blockData.seatsPerRow.forEach((numSeats, rowIndex) => {
            let rowDiv = document.createElement("div");
            rowDiv.classList.add("seat-row");

            let rowLetter = String.fromCharCode(65 + rowIndex); // A, B, C...

            for (let i = 1; i <= numSeats; i++) {
                let seatNum = `${prefix}${rowLetter}${i}`;
                let seat = createSeat({ type: blockData.type, price: blockData.price, name: blockData.name }, seatNum);
                rowDiv.appendChild(seat);
            }
            blockDiv.appendChild(rowDiv);
        });
        return blockDiv;
    }

    arena.forEach(section => {
        if (section.type === "split") {
            let splitDiv = document.createElement("div");
            splitDiv.className = "d-flex justify-content-between w-100 mt-4 split-stands";
            splitDiv.style.maxWidth = "850px";

            let leftBlock = createBlock(section.items[0], "GL-");
            let rightBlock = createBlock(section.items[1], "GR-");
            
            splitDiv.appendChild(leftBlock);
            splitDiv.appendChild(rightBlock);
            groundLayout.appendChild(splitDiv);
        } else {
            let block = createBlock(section, section.id === "vip-pit" ? "V-" : "S-");
            if (section.id !== "vip-pit") block.classList.add("mt-4");
            groundLayout.appendChild(block);
        }
    });

    function updateTotal() {
      let total = selected.reduce((sum, s) => sum + s.price, 0);
      document.getElementById("total").innerText = total;
      document.getElementById("seatCount").innerText = selected.length;
      document.getElementById("selectedSeats").innerText =
        selected.length ? selected.map(s => `${s.num} (Rs.${s.price})`).join(", ") : "None";
    }

    function selectBestSeats() {
      let availableSeats = Array.from(document.querySelectorAll(".seat:not(.booked)"));
      
      if (availableSeats.length === 0) {
        alert("No seats available!");
        return;
      }

      let screenCenter = window.innerWidth / 2;
      
      availableSeats.sort((a, b) => {
        let rectA = a.getBoundingClientRect();
        let rectB = b.getBoundingClientRect();
        let distA = Math.abs(screenCenter - (rectA.left + rectA.width / 2));
        let distB = Math.abs(screenCenter - (rectB.left + rectB.width / 2));
        return distA - distB;
      });

      let seatsToSelect = Math.min(6, availableSeats.length);
      
      availableSeats.forEach(s => {
          if(s.classList.contains("selected")) {
              s.click();
          }
      });

      setTimeout(() => {
          for (let i = 0; i < seatsToSelect; i++) {
            availableSeats[i].click();
          }
      }, 200);
    }

    function goToPayment() {
      if (selected.length === 0) {
        alert("Select at least one seat!");
        return;
      }
      let total = selected.reduce((sum, s) => sum + s.price, 0);
      let selectedSeats = selected.map(s => s.num);

      localStorage.removeItem("movie");
      localStorage.removeItem("cricketMatch");
      localStorage.setItem("amount", total);
      localStorage.setItem("seats", JSON.stringify(selectedSeats));

      let bookedSeats = JSON.parse(localStorage.getItem("bookedSeats")) || [];
      let updated = [...new Set([...bookedSeats, ...selectedSeats])];
      localStorage.setItem("bookedSeats", JSON.stringify(updated));

      let btn = document.getElementById("proceedBtn");
      btn.innerHTML = "Processing...";
      btn.disabled = true;

      setTimeout(() => {
        window.location.href = "payment.html";
      }, 1200);
    }
    let timeLeft = 300;
    let timer = setInterval(() => {
      let min = Math.floor(timeLeft / 60);
      let sec = timeLeft % 60;
      document.getElementById("timer").innerText = `⏳ Time Left: ${min}:${sec < 10 ? "0" + sec : sec}`;
      timeLeft--;
      if (timeLeft < 0) {
        clearInterval(timer);
        alert("Session expired! Seats released.");
        location.reload();
      }
    }, 1000);

    // ================= MORE BOLLYWOOD SINGERS =================
    if (typeof concerts !== 'undefined') {
      let singer = data ? data.name : "";
      let moreSingers = concerts.filter(c => c.name !== singer);
      // Pick up to 4 randomly
      moreSingers = moreSingers.sort(() => 0.5 - Math.random()).slice(0, 4);
      
      let moreSingersContainer = document.getElementById("moreSingersList");
      if (moreSingersContainer) {
        moreSingersContainer.innerHTML = "";
        moreSingers.forEach((c, index) => {
          const imgId = `more-img-${index}`;
          const fallbacks = getImageFallbacks(c.img);
          moreSingersContainer.innerHTML += `
            <div class="col-md-3 col-sm-6">
              <div class="card h-100" onclick="goToDetails('${c.name}','${c.city}','${c.venue}','${c.date}','${c.time}','${c.price}', document.getElementById('${imgId}').src)" style="background: #1a1a1a; border: 1px solid #333; cursor: pointer; transition: transform 0.3s ease; border-radius: 12px; overflow: hidden; height: 100%;">
                <img src="${c.img}" 
                     id="${imgId}"
                     class="card-img-top" 
                     alt="${c.name}" 
                     style="aspect-ratio: 1 / 1; object-fit: cover;" 
                     data-fallbacks='${JSON.stringify(fallbacks)}'
                     data-fallback-index="0"
                     onerror="handleConcertImgError(this)">
                <div class="card-body p-3">
                  <h5 class="card-title text-white fw-bold" style="font-size: 1.1rem; margin-bottom: 5px;">${c.name}</h5>
                  <p class="card-text text-secondary" style="font-size: 0.9rem; margin-bottom: 0;">${c.venue}, ${c.city} • ${c.month}</p>
                </div>
              </div>
            </div>
          `;
        });
      }
    }
  </script>
</body>
</html>
