<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="referrer" content="no-referrer-when-downgrade">
  <meta charset="UTF-8">
  <title>Select Seats</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background-color: #0f111a;
      color: white;
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .movie-container {
      margin-top: 20px;
      margin-bottom: 20px;
      text-align: center;
      z-index: 2;
    }
    .movie-container h3 {
      font-weight: 700;
      margin-bottom: 5px;
      letter-spacing: 1px;
    }
    .movie-info {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 20px;
    }
    
    /* 2D SCREEN */
    .screen-container {
      margin-bottom: 40px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .screen-2d {
      background: linear-gradient(to bottom, #ffffff, #888);
      height: 12px;
      width: 80%;
      max-width: 500px;
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
      box-shadow: 0 -15px 30px rgba(229, 9, 20, 0.5);
      margin-bottom: 15px;
    }
    .screen-text {
      color: #888;
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* SEAT MAP */
    .seat-map-wrapper {
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 10px 20px 40px 20px;
      display: flex;
      justify-content: center;
      scrollbar-width: thin;
      scrollbar-color: #e50914 #1a1c23;
    }
    .seat-map-wrapper::-webkit-scrollbar {
      height: 8px;
    }
    .seat-map-wrapper::-webkit-scrollbar-track {
      background: #1a1c23;
      border-radius: 10px;
    }
    .seat-map-wrapper::-webkit-scrollbar-thumb {
      background: #e50914;
      border-radius: 10px;
    }

    .seat-map {
      margin-bottom: 20px;
      min-width: max-content; 
      padding: 0 40px; 
    }
    .seat-grid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .seat-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px; /* Reduced gap for more seats */
    }
    .row-label {
      width: 25px;
      text-align: right;
      margin-right: 10px;
      color: #888;
      font-weight: bold;
      font-size: 0.85rem;
    }
    
    /* INDIVIDUAL SEAT */
    .seat {
      width: 26px; /* Smaller seat */
      height: 24px;
      background-color: #2b3040;
      border-radius: 5px 5px 2px 2px;
      position: relative;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.5rem;
      color: transparent;
      user-select: none;
    }
    .seat::before {
      content: '';
      position: absolute;
      top: -5px;
      left: 10%;
      width: 80%;
      height: 5px;
      background-color: #3b4259;
      border-radius: 3px 3px 0 0;
      transition: all 0.3s ease;
    }
    .seat:hover {
      transform: translateY(-4px) scale(1.15);
      background-color: #434c66;
      box-shadow: 0 8px 12px rgba(0,0,0,0.5);
      z-index: 10;
    }
    .seat:hover::before {
      background-color: #556182;
    }
    .seat.selected {
      background-color: #e50914;
      color: white;
      box-shadow: 0 0 15px rgba(229, 9, 20, 0.6);
      transform: scale(1.1);
    }
    .seat.selected::before {
      background-color: #ff3b45;
    }
    .seat.occupied {
      background-color: #1a1c23;
      cursor: not-allowed;
      opacity: 0.6;
    }
    .seat.occupied::before {
      background-color: #22252e;
    }
    .seat.occupied:hover {
      transform: none;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      z-index: 1;
    }
    
    /* RECLINER SEATS */
    .recliner-row {
      margin-top: 30px;
      padding-top: 25px;
      border-top: 1px dashed #333;
      position: relative;
    }
    .recliner-row::before {
      content: 'ROYAL RECLINERS';
      position: absolute;
      top: 5px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffcc00;
      font-size: 0.75rem;
      letter-spacing: 2px;
      font-weight: bold;
      white-space: nowrap;
    }
    .seat.recliner {
      width: 36px;
      height: 30px;
      background-color: #4a3f24;
      border-radius: 6px 6px 3px 3px;
    }
    .seat.recliner::before {
      height: 10px;
      top: -10px;
      background-color: #5c4e2c;
      border-radius: 5px 5px 0 0;
    }
    .seat.recliner.selected {
      background-color: #ffcc00;
      color: #000;
      box-shadow: 0 0 20px rgba(255, 204, 0, 0.6);
    }
    .seat.recliner.selected::before {
      background-color: #ffe066;
    }
    
    /* AISLE */
    .aisle {
      width: 30px; /* Slightly wider aisle to break up large rows */
    }

    /* LEGEND */
    .legend {
      display: flex;
      justify-content: center;
      gap: 25px;
      margin-bottom: 40px;
      background: rgba(255,255,255,0.05);
      padding: 15px 30px;
      border-radius: 30px;
      backdrop-filter: blur(10px);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      color: #ccc;
    }
    .legend-seat {
      width: 20px;
      height: 18px;
      border-radius: 4px 4px 1px 1px;
      position: relative;
    }
    .legend-seat::before {
      content: '';
      position: absolute;
      top: -4px;
      left: 10%;
      width: 80%;
      height: 4px;
      border-radius: 2px 2px 0 0;
    }
    .legend-seat.available { background-color: #2b3040; }
    .legend-seat.available::before { background-color: #3b4259; }
    .legend-seat.selected { background-color: #e50914; }
    .legend-seat.selected::before { background-color: #ff3b45; }
    .legend-seat.occupied { background-color: #1a1c23; }
    .legend-seat.occupied::before { background-color: #22252e; }
    .legend-seat.recliner { background-color: #4a3f24; width: 25px; }
    .legend-seat.recliner::before { background-color: #5c4e2c; }

    /* CHECKOUT PANEL */
    .checkout-panel {
      background: rgba(20, 20, 25, 0.9);
      border-top: 1px solid #333;
      padding: 20px;
      width: 100%;
      position: fixed;
      bottom: 0;
      left: 0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      z-index: 10;
    }
    .checkout-info h4 {
      margin: 0 0 5px 0;
      font-size: 1.1rem;
      color: #fff;
    }
    .checkout-info p {
      margin: 0;
      color: #888;
      font-size: 0.9rem;
    }
    .total-price {
      font-size: 1.8rem;
      font-weight: 800;
      color: #e50914;
    }
    .btn-proceed {
      background: linear-gradient(135deg, #e50914, #b80710);
      border: none;
      padding: 12px 30px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 30px;
      transition: all 0.3s;
      box-shadow: 0 5px 15px rgba(229, 9, 20, 0.4);
    }
    .btn-proceed:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(229, 9, 20, 0.6);
      background: linear-gradient(135deg, #f40a16, #d20812);
    }
    
    .main-wrapper {
      padding-bottom: 120px;
      width: 100%;
      max-width: 1000px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-dark w-100 px-4 py-3" style="background: rgba(0,0,0,0.5);">
    <a class="navbar-brand fw-bold text-danger cursor-pointer" style="cursor:pointer;" onclick="history.back()">
        <i class="bi bi-arrow-left me-2"></i> Back
    </a>
</nav>

<div class="main-wrapper">
    <div class="movie-container">
        <h3 id="movieTitleDisplay">Movie Title</h3>
        <div class="movie-info">
            <span id="theatreDisplay">Theatre Name</span> • <span id="timeDisplay">10:00 AM</span> • <strong id="screenTypeDisplay" class="text-danger">2D</strong>
        </div>
    </div>

    <!-- Screen -->
    <div class="screen-container">
        <div class="screen-2d"></div>
        <div class="screen-text">All eyes this way please!</div>
    </div>

    <!-- Legend -->
    <div class="legend">
        <div class="legend-item">
            <div class="legend-seat available"></div> Available
        </div>
        <div class="legend-item">
            <div class="legend-seat selected"></div> Selected
        </div>
        <div class="legend-item">
            <div class="legend-seat occupied"></div> Occupied
        </div>
        <div class="legend-item">
            <div class="legend-seat recliner"></div> Recliner
        </div>
    </div>

    <!-- Seat Map -->
    <div class="seat-map-wrapper">
        <div class="seat-map">
            <div id="seatContainer" class="seat-grid">
                <!-- Seats generated via JS -->
            </div>
        </div>
    </div>
</div>

<!-- Checkout Panel -->
<div class="checkout-panel">
    <div class="checkout-info">
        <h4>Seats: <span id="selectedSeats" class="text-white">None</span></h4>
        <p id="pricingDisplay">Premium: ₹200 | Recliner: ₹400</p>
    </div>
    <div>
        <span class="total-price me-4">₹<span id="total">0</span></span>
        <button onclick="goToPayment()" class="btn btn-proceed text-white" id="proceedBtn" disabled>
            Proceed <i class="bi bi-arrow-right ms-1"></i>
        </button>
    </div>
</div>

<script src="seat_selection_movie.js"></script>
</body>
</html>
