<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="referrer" content="no-referrer-when-downgrade">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Category | EventNest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            color: #333;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- LEFT SIDEBAR --- */
        .sidebar {
            width: 380px;
            background: #fff;
            height: 100%;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .match-header {
            padding: 24px;
            border-bottom: 1px solid #eee;
        }

        .team-logos {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .team-logo-circle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid #ddd;
            padding: 4px;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .team-logo-circle img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .vs-text {
            font-size: 0.8rem;
            font-weight: 700;
            color: #888;
        }

        .match-title {
            font-size: 1.15rem;
            font-weight: 800;
            color: #1a1a1a;
            text-transform: uppercase;
            line-height: 1.4;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .match-time {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 12px;
        }

        .instruction-text {
            font-size: 0.8rem;
            color: #777;
            line-height: 1.5;
            margin-bottom: 0;
        }

        /* Price List Accordion */
        .price-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .price-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
        }

        .price-item:hover {
            background: #fafafa;
        }

        .price-item.active {
            background: #f0f8ff;
        }

        .price-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .price-color-box {
            width: 14px;
            height: 14px;
            border-radius: 3px;
        }

        .price-value {
            font-weight: 700;
            font-size: 1rem;
        }

        .price-item i {
            color: #aaa;
            font-size: 0.9rem;
            transition: transform 0.2s;
        }

        /* --- RIGHT SIDEBAR (STADIUM) --- */
        .stadium-container {
            flex-grow: 1;
            background: #f0f0f5;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            perspective: 1200px;
            box-shadow: inset 20px 0 30px rgba(0,0,0,0.05);
        }
        
        .stadium-wrapper {
            width: 90%;
            height: 90%;
            max-width: 800px;
            max-height: 800px;
            transform-style: preserve-3d;
            transform: rotateX(25deg) rotateY(-5deg);
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            filter: drop-shadow(0 40px 30px rgba(0,0,0,0.25));
        }

        #stadiumSvg {
            width: 100%;
            height: 100%;
        }

        .stand-path {
            cursor: pointer;
            transition: opacity 0.2s, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            stroke: #fff;
            stroke-width: 2;
            transform-origin: center;
        }

        .stand-path:hover {
            opacity: 0.95;
            filter: brightness(1.2);
            transform: translateZ(40px) scale(1.02);
        }

        .stand-path.dimmed {
            opacity: 0.2;
        }

        .stand-text {
            font-family: 'Inter', sans-serif;
            font-size: 8px;
            font-weight: 700;
            fill: #111;
            pointer-events: none;
            text-anchor: middle;
            dominant-baseline: middle;
        }
        
        .stand-text.light {
            fill: #fff;
        }

        /* --- SEAT MODAL --- */
        .seat-modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        
        .seat-modal-content {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 700px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            border: 1px solid #eee;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.8rem;
            cursor: pointer;
            color: #888;
        }

        .close-modal:hover { color: #333; }

        /* SEAT STYLES */
        .seat-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin: 30px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        .seat-row {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .stadium-seat {
            width: 28px;
            height: 28px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 4px 4px 2px 2px;
            cursor: pointer;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            user-select: none;
            transition: all 0.2s;
            position: relative;
        }

        .stadium-seat::before {
            content: '';
            position: absolute;
            top: -3px;
            left: 10%;
            width: 80%;
            height: 3px;
            background-color: #ddd;
            border-radius: 2px 2px 0 0;
        }

        .stadium-seat:hover {
            border-color: #e50914;
            color: #e50914;
        }

        .stadium-seat.selected {
            background: #e50914;
            border-color: #e50914;
            color: white;
            transform: scale(1.1);
        }

        .stadium-seat.selected::before { background-color: #b20710; }

        .stadium-seat.occupied {
            background: #eee;
            border-color: #ddd;
            color: #aaa;
            cursor: not-allowed;
        }

        .stadium-seat.occupied::before { background-color: #ccc; }
        .stadium-seat.occupied:hover { border-color: #ddd; color: #aaa; }

        /* Checkout Panel */
        .checkout-panel {
            background: #fff;
            border-top: 1px solid #eee;
            padding: 15px 40px;
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
        }

        .total-price { font-size: 1.5rem; font-weight: 800; color: #333; }
        
        .btn-proceed {
            background: #e50914;
            color: white;
            padding: 10px 40px;
            border-radius: 4px;
            border: none;
            font-weight: 600;
            font-size: 1rem;
            transition: background 0.2s;
        }

        .btn-proceed:hover { background: #d00812; }
        .btn-proceed:disabled { background: #ccc; cursor: not-allowed; }

        .legend {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 10px;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: #555; }
        .legend-seat { width: 16px; height: 16px; border-radius: 2px; border: 1px solid #ccc; }

        .top-nav {
            position: absolute;
            top: 20px;
            right: 30px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <!-- Left Sidebar -->
    <div class="sidebar">
        <div class="match-header">
            <div class="team-logos">
                <div class="team-logo-circle"><img id="logo1" src="" alt="Team 1" onerror="this.onerror=null; this.src='images/eventnest_logo_v2.jpg';"></div>
                <div class="vs-text">VS</div>
                <div class="team-logo-circle"><img id="logo2" src="" alt="Team 2" onerror="this.onerror=null; this.src='images/eventnest_logo_v2.jpg';"></div>
            </div>
            <div class="match-title" id="matchTitleText">Match Title</div>
            <div class="match-time" id="matchDateTime">Date | Time</div>
            <p class="instruction-text">Please select the category of your choice. It will get highlighted on the layout.</p>
        </div>
        <ul class="price-list" id="priceList">
            <!-- Prices injected via JS -->
        </ul>
    </div>

    <!-- Right Stadium Area -->
    <div class="stadium-container">
        <div class="top-nav">
            <button class="btn btn-outline-dark btn-sm rounded-pill px-3" onclick="history.back()"><i class="bi bi-x-lg me-1"></i> Close</button>
        </div>
        <div class="stadium-wrapper" data-tilt data-tilt-max="15" data-tilt-speed="400" data-tilt-perspective="1000" data-tilt-scale="1.05">
            <svg id="stadiumSvg" viewBox="0 0 1000 1000">
                <!-- Dynamic SVG generated via JS -->
            </svg>
        </div>
    </div>

    <!-- Seat Selection Modal -->
    <div class="seat-modal-overlay" id="seatModal">
        <div class="seat-modal-content">
            <span class="close-modal" onclick="closeStand()">&times;</span>
            <div class="d-flex justify-content-between align-items-center mb-1">
                <h4 id="modalStandTitle" class="mb-0 fw-bold" style="color: #333;">Stand Name</h4>
                <div id="modalStandColor" style="width: 16px; height: 16px; border-radius: 3px;"></div>
            </div>
            <p class="mb-3 text-muted">Rs. <span id="modalStandPrice" class="fw-bold text-dark"></span></p>
            
            <div class="legend">
                <div class="legend-item"><div class="legend-seat" style="background:#fff;"></div> Available</div>
                <div class="legend-item"><div class="legend-seat" style="background:#e50914; border-color:#e50914;"></div> Selected</div>
                <div class="legend-item"><div class="legend-seat" style="background:#eee;"></div> Occupied</div>
            </div>

            <div class="seat-grid" id="seatGrid"></div>
            
            <div class="text-center">
                <button class="btn btn-dark px-5 py-2" onclick="closeStand()">Confirm Selection</button>
            </div>
        </div>
    </div>

    <!-- Checkout Panel -->
    <div class="checkout-panel" id="checkoutPanel" style="display: none;">
        <div>
            <h6 class="mb-1 fw-bold text-dark"><span id="selectedCount">0</span> Tickets Selected</h6>
            <small id="selectedSeatsText" class="text-muted">None</small>
        </div>
        <div class="d-flex align-items-center">
            <div class="text-end me-4">
                <small class="text-muted d-block" style="line-height: 1; font-size: 0.75rem; text-transform: uppercase;">Amount Payable</small>
                <span class="total-price">Rs. <span id="totalPrice">0</span></span>
            </div>
            <button onclick="goToPayment()" class="btn-proceed" id="proceedBtn">
                Proceed
            </button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script src="stadium_seat_selection.js"></script>
</body>
</html>
